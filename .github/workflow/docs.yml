name: Deploy Documentation

on:
  push:
    branches: [main] # Se lance à chaque fois que tu push sur main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        # Installe Sphinx, Furo et les extensions définies dans votre pyproject.toml
        run: uv sync --all-extras

      - name: Build Sphinx Documentation
        # On génère le HTML dans le dossier "public" [cite: 18, 186]
        run: uv run sphinx-build docs/source public

      - name: Create .nojekyll
        # Indispensable pour que GitHub Pages affiche le thème Furo et le menu latéral
        run: touch public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4